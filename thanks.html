<!DOCTYPE html>
<html lang="uk" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Дякуємо за замовлення!</title>
    <script src="https://cdn.tailwindcss.com"></script>

</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl text-center max-w-lg w-full border border-gray-100">
        <div class="w-20 h-20 bg-green-100 rounded-full flex items-center justify-center mx-auto mb-6">

        <div class="bg-orange-50 p-4 rounded-xl border border-orange-100 text-left mb-8 flex gap-4 items-center">
            <i class="fa-solid fa-headset text-orange-400 text-2xl mt-1 self-start"></i>
            <p class="text-sm text-slate-700">Ми працюємо з 09:00 до 20:00. Якщо ви залишили заявку в неробочий час, ми зателефонуємо вам наступного ранку.</p>
        </div>

        <a href="index.html" class="inline-block w-full bg-[#FFD814] hover:bg-[#F7CA00] text-black font-bold py-3.5 px-6 rounded-full transition-transform hover:-translate-y-0.5 shadow-md">
